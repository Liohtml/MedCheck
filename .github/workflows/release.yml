name: Release

# Publishes a release when a version tag (v*) is pushed:
#   1. builds + checks the Python package and uploads it to PyPI (OIDC Trusted
#      Publishing — no API token secret required), and
#   2. builds the lite + full Docker images and pushes them to GHCR.
#
# Setup required once by a maintainer:
#   - PyPI: configure this repo + the `pypi` environment as a Trusted Publisher
#     at https://pypi.org/manage/account/publishing/ (project name: medcheck,
#     workflow: release.yml, environment: pypi).
#   - GHCR: no setup needed — uses the built-in GITHUB_TOKEN.
#
# Tag-version / package-version mismatches fail fast so a tag can never publish
# the wrong artifact.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build & verify package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7

      - name: Verify tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(uv run --no-project python -c 'import tomllib,pathlib;print(tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"])')"
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match pyproject version $PKG"; exit 1
          fi

      - name: Build sdist + wheel
        run: uv build

      - name: Check artifacts
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC: required for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Disable PEP 740 attestations: they sign via Sigstore's Rekor, which
          # returned HTTP 502 and failed the v0.2.1 publish. Trusted Publishing
          # (OIDC) still authenticates the upload; this just drops the optional
          # transparency-log attestation so a Sigstore outage can't block release.
          attestations: false

  docker:
    name: Build & push Docker images
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Build & push lite image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: lite
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}
            ${{ steps.img.outputs.name }}:lite
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}-lite
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push full image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: full
          push: true
          tags: |
            ${{ steps.img.outputs.name }}:full
            ${{ steps.img.outputs.name }}:${{ github.ref_name }}-full
          cache-from: type=gha
          cache-to: type=gha,mode=max
