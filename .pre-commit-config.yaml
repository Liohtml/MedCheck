repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: [--branch, main]
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        exclude: "(uv.lock)"

  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types: [python]

      - id: ruff-lint
        name: ruff lint
        language: system
        entry: uv run ruff check --fix
        types: [python]
